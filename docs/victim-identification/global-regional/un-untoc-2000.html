      <div class="col-lg-12"><p style="text-align: justify;">The<strong> United Nations Convention against Transnational Organized Crime</strong>, adopted by General Assembly resolution 55/25 of 15 November 2000, is the main international instrument in the fight against transnational organized crime. It opened for signature by Member States at a High-level Political Conference convened for that purpose in Palermo, Italy, on 12-15 December 2000 and entered into force on 29 September 2003. The Convention is further supplemented by three Protocols, which target specific areas and manifestations of organized crime: the Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children; the Protocol against the Smuggling of Migrants by Land, Sea and Air; and the Protocol against the Illicit Manufacturing of and Trafficking in Firearms, their Parts and Components and Ammunition. Countries must become parties to the Convention itself before they can become parties to any of the Protocols.</p>
<p style="text-align: justify;">The Convention represents a major step forward in the fight against transnational organized crime and signifies the recognition by Member States of the seriousness of the problems posed by it, as well as the need to foster and enhance close international cooperation in order to tackle those problems. States that ratify this instrument commit themselves to taking a series of measures against transnational organized crime, including the creation of domestic criminal offences (participation in an organized criminal group, money laundering, corruption and obstruction of justice); the adoption of new and sweeping frameworks for extradition, mutual legal assistance and law enforcement cooperation; and the promotion of training and technical assistance for building or upgrading the necessary capacity of national authorities.</p>
<p style="text-align: justify;">The <strong>Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children</strong>, was adopted by General Assembly resolution 55/25. It entered into force on 25 December 2003. It is the first global legally binding instrument with an agreed definition on trafficking in persons. The intention behind this definition is to facilitate convergence in national approaches with regard to the establishment of domestic criminal offences that would support efficient international cooperation in investigating and prosecuting trafficking in persons cases. An additional objective of the Protocol is to protect and assist the victims of trafficking in persons with full respect for their human rights.</p>
<p style="text-align: justify;">The <strong>Protocol against the Smuggling of Migrants by Land, Sea and Air</strong>, adopted by General Assembly resolution 55/25, entered into force on 28 January 2004. It deals with the growing problem of organized criminal groups who smuggle migrants, often at high risk to the migrants and at great profit for the offenders. A major achievement of the Protocol was that, for the first time in a global international instrument, a definition of smuggling of migrants was developed and agreed upon. The Protocol aims at preventing and combating the smuggling of migrants, as well as promoting cooperation among States parties, while protecting the rights of smuggled migrants and preventing the worst forms of their exploitation which often characterize the smuggling process.</p>
<p style="text-align: justify;">The <strong>Protocol against the Illicit Manufacturing of and Trafficking in Firearms, their Parts and Components and Ammunition</strong> was adopted by General Assembly resolution 55/255 of 31 May 2001. It entered into force on 3 July 2005. The objective of the Protocol, which is the first legally binding instrument on small arms that has been adopted at the global level, is to promote, facilitate and strengthen cooperation among States Parties in order to prevent, combat and eradicate the illicit manufacturing of and trafficking in firearms, their parts and components and ammunition. By ratifying the Protocol, States make a commitment to adopt a series of crime-control measures and implement in their domestic legal order three sets of normative provisions: the first one relates to the establishment of criminal offenses related to illegal manufacturing of, and trafficking in, firearms on the basis of the Protocol requirements and definitions; the second to a system of government authorizations or licensing intending to ensure legitimate manufacturing of, and trafficking in, firearms; and the third one to the marking and tracing of firearms.</p></div>

         <h2 class="site-label ">General Assembly resolutions</h2><p>In its resolution 55/25 of 15 November 2000, the General Assembly adopted the United Nations Convention against Transnational Organized Crime and two of its supplementary Protocols namely: the Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children and the Protocol against the Smuggling of Migrants by Land, Air and Sea.</p>
<p><strong><a href="/pdf/crime/a_res_55/res5525a.pdf">Arabic</a> - <a href="/pdf/crime/a_res_55/res5525c.pdf">Chinese</a> - <a href="/pdf/crime/a_res_55/res5525e.pdf">English</a> - <a href="/pdf/crime/a_res_55/res5525f.pdf">French</a> - <a href="/pdf/crime/a_res_55/res5525r.pdf">Russian</a> - <a href="/pdf/crime/a_res_55/res5525s.pdf">Spanish</a></strong></p>
<p>In its resolution 55/255 of 31 May 2001, the General Assembly adopted the Protocol against the Illicit Manufacturing of and Trafficking in Firearms, Their Parts and Components and Ammunition, supplementing the United Nations Convention against Transnational Organized Crime.</p>
